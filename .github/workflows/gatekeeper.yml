name: Gatekeeper

on:
  pull_request:

jobs:
  governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Gatekeeper
        uses: uses: doctorfixes/vireon-gatekeeper-action@main

        with:
          contract: .gatekeeper/contract.json
          schema: .gatekeeper/schema.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
