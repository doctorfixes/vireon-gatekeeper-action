name: "Vireon Gatekeeper"
description: "Governance kernel: contract + schema + drift scoring."
author: "doctorfixes"

inputs:
  contract:
    description: "Path to Gatekeeper contract JSON"
    required: true
    default: ".gatekeeper/contract.json"
  schema:
    description: "Path to Gatekeeper schema JSON"
    required: true
    default: ".gatekeeper/schema.json"
  mode:
    description: "observe | enforce"
    required: false
    default: "enforce"

outputs:
  should_block:
    description: "true if the PR should be blocked"
  reason:
    description: "Explanation for the decision"
  score:
    description: "Drift/risk score between 0 and 1"
  failure_type:
    description: "policy_violation | config_error | engine_error | none"

runs:
  using: "node16"
  main: "index.js"
