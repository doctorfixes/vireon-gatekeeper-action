name: "Gatekeeper by Vireon"
description: "Governance-grade enforcement engine for pull requests. Powered by Vireon, the Intelligence Engine."
author: "Vireon"
branding:
  icon: shield
  color: blue

inputs:
  token:
    description: "GitHub token for PR context"
    required: true
  diff:
    description: "Optional diff override (defaults to PR diff)"
    required: false
  config:
    description: "Path to Gatekeeper config file (defaults to .github/gatekeeper.yml)"
    required: false
    default: ".github/gatekeeper.yml"
  build_baseline:
    description: "When 'true', scan the repository and write a baseline to .gatekeeper/baseline.json instead of running PR checks."
    required: false
    default: "false"

runs:
  using: "node20"
  main: "index.js"

permissions:
  contents: read
  pull-requests: write
  checks: write
