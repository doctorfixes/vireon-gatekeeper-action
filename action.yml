name: "Gatekeeper by Vireon"
description: "Governance-grade enforcement engine for pull requests. Powered by Vireon, the Intelligence Engine."
author: "Vireon"
branding:
  icon: shield
  color: blue

inputs:
  token:
    description: "GitHub token for PR context"
    required: true
  diff:
    description: "Optional diff override (defaults to PR diff)"
    required: false

runs:
  using: "node20"
  main: "index.js"

permissions:
  contents: read
  pull-requests: write
  checks: write
