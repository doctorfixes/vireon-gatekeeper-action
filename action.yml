name: "Vireon Gatekeeper"
description: "Governance-grade PR gate: contract + schema + drift scoring."
author: "doctorfixes"

inputs:
  contract:
    description: "Path to Gatekeeper contract JSON"
    required: true
    default: ".gatekeeper/contract.json"
  schema:
    description: "Path to Gatekeeper schema JSON"
    required: true
    default: ".gatekeeper/schema.json"

outputs:
  should_block:
    description: "true if the PR should be blocked"
  reason:
    description: "Human-readable explanation for the decision"
  score:
    description: "Drift/risk score between 0 and 1"

runs:
  using: "node16"
  main: "index.js"
