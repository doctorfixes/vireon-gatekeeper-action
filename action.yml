name: "Vireon Gatekeeper"
description: "Governance kernel with PR comments, contract diff, and schema-driven severity."
author: "doctorfixes"

inputs:
  contract:
    description: "Path to Gatekeeper contract JSON"
    required: true
    default: ".gatekeeper/contract.json"
  schema:
    description: "Path to Gatekeeper/schema.json"
    required: true
    default: ".gatekeeper/schema.json"
  mode:
    description: "observe | enforce"
    required: false
    default: "observe"
  github_token:
    description: "GitHub token for posting PR comments"
    required: false

outputs:
  should_block:
    description: "true if the PR should be blocked"
  reason:
    description: "Explanation for the decision"
  score:
    description: "Drift/risk score between 0 and 1"
  failure_type:
    description: "policy_violation | config_error | engine_error | schema_error | contract_error | none"

runs:
  using: "node16"
  main: "index.js"
