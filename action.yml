name: "Gatekeeper Governance Kernel"
description: "Runs the Gatekeeper architecture governance engine on pull requests."
runs:
  using: "node20"
  main: "index.js"

inputs:
  contract:
    description: "Path to governance contract"
    required: true
  schema:
    description: "Path to governance schema"
    required: true

outputs:
  should_block:
    description: "Whether the PR should be blocked"
  reason:
    description: "Human-readable explanation of the gatekeeper decision"
  score:
    description: "Numeric drift score (0–1) when available"
